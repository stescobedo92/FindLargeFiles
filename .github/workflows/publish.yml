name: Publish to PowerShell Gallery

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: powershell-gallery-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish Version
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate module manifest and release tag
        shell: pwsh
        run: |
          $manifest = Test-ModuleManifest -Path './Find-LargeFiles/Find-LargeFiles.psd1' -ErrorAction Stop
          $expectedTag = "v$($manifest.Version)"
          $releaseTag = '${{ github.event.release.tag_name }}'

          Write-Output "Module: $($manifest.Name)"
          Write-Output "Version: $($manifest.Version)"
          Write-Output "Release tag: $releaseTag"

          if ($releaseTag -ne $expectedTag) {
            throw "Release tag '$releaseTag' must match module version '$expectedTag'."
          }

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser

      - name: Run tests before publishing
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './Tests'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config

      - name: Publish to PowerShell Gallery
        shell: pwsh
        env:
          POWER_SHELL_GALLERY_API_KEY: ${{ secrets.POWER_SHELL_GALLERY_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:POWER_SHELL_GALLERY_API_KEY)) {
            throw 'The POWER_SHELL_GALLERY_API_KEY secret is required to publish this module.'
          }

          Publish-Module `
            -Path './Find-LargeFiles' `
            -Repository PSGallery `
            -NuGetApiKey $env:POWER_SHELL_GALLERY_API_KEY `
            -Verbose
